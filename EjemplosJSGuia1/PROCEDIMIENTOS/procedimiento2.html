<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Datos del Empleado</title>
</head>
<body>
    <h2>Captura de Datos por Teclado</h2>

    <script>
        // CAptura de datos mediante teclado
        let nombre = prompt("Ingrese el nombre del empleado: ");
        let sueldo = prompt("Ingrese el Sueldo del empleado: ");

        // Impresion en pantalla
        document.write("Nombre del empleado: " + nombre + "<br>");
        document.write("Sueldo: " + sueldo + " pesos")
    </script>
    
</body>
</html>
