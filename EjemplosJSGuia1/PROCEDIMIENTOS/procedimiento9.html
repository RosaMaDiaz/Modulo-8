<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedimiento #9 - Clasificacion de triangulos</title>
    <script>
        let equilateros = 0;
        let isosceles = 0;
        let escalenos = 0;

        document.write("<h2>Clasificacion de Triangulos</h2>");

        for (let i = 1; i <= 4; i++){
            let lado1 = parseFloat(prompt("Triangulo " + i + "- Ingrese el primer lado: "));
            let lado2 = parseFloat(prompt("Triangulo " + i + "- Ingrese el segundo lado: "));
            let lado3 = parseFloat(prompt("Triangulo " + i + "- Ingrese el tercer lado: "));
        
            document.write("<h3>Triangjulo " + i + "</h3>");
            document.write("Lados: " + lado1 + ", " + lado2 + ", " + lado3 + "<br>");

            //Determinar el tipo de triangulo
            if (lado1 === lado2 && lado2 === lado3) {
                document.write("Tipo: Equilatero <br><br>");
                equilateros++;
            } else if (lado1 === lado2 || lado1 === lado3 || lado2 === lado3) {
                document.write("Tipo: Isosceles <br><br>");
                isosceles++;
            } else {
                document.write("Tipo: Escaleno <br><br>");
                escalenos++;
            }
        }

        //mostrar cantidad de cada tipo
        document.write("<h2>Resumen</h2>");
        document.write("Cantidad de triangulo equilateros: " + equilateros + "<br>")
        document.write("Cantidad de triangulo isosceles: " + isosceles + "<br>")
        document.write("Cantidad de triangulo escalenos: " + escalenos + "<br>")

        //Determinar el tipo con menor cantidad
        let menorTipo ="";
        let menorCantidad = Math.min(equilateros, isosceles, escalenos);
        if (menorCantidad === equilateros) menorTipo = "Equilateros";
        else if (menorCantidad === isosceles) menorTipo ="Isosceles";
        else menorTipo = "Escaleno";

        document.write("<strong>Tipo de triangulo con menor cantidad: " + menorTipo + "</strong>");

    </script>
</head>
<body>
    
</body>
</html>
