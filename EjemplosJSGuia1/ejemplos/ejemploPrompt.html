<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Prompt</title>
</head>
<body>

    <script>
        var nombre = prompt("Ingresa tu nombre: ");
        if (nombre) {
            alert ("¡Hola, " + nombre + "!Bienvenido al módulo de JavaScript.");
        } else {
            alert ("¡Hola, " + nombre + "No ingresaste ningún nombre.");
        }
    </script>
    
</body>
</html>
