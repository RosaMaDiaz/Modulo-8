<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo JS no. 5 - Estructura Switch</title>
</head>
<body>
    <h2>Ejemplo de uso de Switch</h2>
    <script>
        var dia =prompt("Ingrese un numero del 1 al 7");
        switch (dia) {
            case "1":
                document.write("Hoy es Lunes");
                break;
            case "2":
                document.write("Hoy es Martes");
                break;
            case "3":
                document.write("Hoy es Miércoles");
                break;
            case "4":
                document.write("Hoy es Jueves");
                break;
            case "5":
                document.write("Hoy es Viernes");
                break;
            case "6":
                document.write("Hoy es Sábado");
                break;
            case "8":
                document.write("Hoy es Domingo");
                break;
            default:                
                document.write("Número fuera de rango");
                
        }
    </script>
    
</body>
</html>
