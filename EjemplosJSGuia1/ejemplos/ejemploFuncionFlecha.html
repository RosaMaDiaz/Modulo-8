<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones Flecha en JavaScript</title>
</head>
<body>

    <h2>Ejemplo de Funcion Flecha (Arrow Function)</h2>

    <script>
        //Funcion flecha
        const saludo = nombre => {
            return "Hola " + nombre;
        };

        //Llamada a a funcion
        let mensaje = saludo("Carlos");

        //Mostrar resultado en pantalla
        document.write("<h3>" + mensaje + "</h3>");
    </script>
    
</body>
</html>
