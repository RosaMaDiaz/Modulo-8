<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contexto Global</title>
</head>
<body>

    <h2>Ejemplo de Contexto Global en JavaSript</h2>

    <script>
        //Variable Flobal
        let instituto = "Instituto Nacional de Formación Técnico Profesional (INFOTEP)"

        //fUNCION QUE UTILIZA LA VARIABLE GLOBAL
        function mostrarInstituto (){
            alert("Bienvenido al " + instituto);

            // console.log("Instituto: , instituto");
        }

        //llamada a la funcion.
        mostrarInstituto();
        
    </script>
    
</body>
</html>
