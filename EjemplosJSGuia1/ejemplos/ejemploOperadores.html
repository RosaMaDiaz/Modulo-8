<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Integrador de Operadores</title>
</head>
<body>
    <h2><u>Ejemplo Integrador de Operadores</u> </h2>
    <script>
        let num1 = 10;
        let num2 = 5;

        document.write("Valor 1: " + num1 + "<br>");
        document.write("Valor 2: " + num1 + "<br><br>");;
        document.write("<hr>");

        document.write("<strong>Operaciones Matemáticas </strong><br>");

        //Operadores matemáticos
        document.write("Suma: " + (num1 + num2) + "<br>");
        document.write("Resta: " + (num1 - num2) + "<br>");
        document.write("Multiplicación: " + (num1 * num2) + "<br>");
        document.write("Divisón: " + (num1 / num2) + "<br><br><hr>");

        //Operadores relacionales
        document.write("<strong>Operaciones Relacionales</strong> <br>");
        document.write("Resultado lógico: 10 > 5  &&  5 < 10 " + (num1 > 5 && num2 < 10));


    </script>
    
</body>
</html>
