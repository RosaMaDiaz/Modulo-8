<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de document.write()</title>
</head>
<body>
    <script>
        var edad = prompt("¿Cuántos años tienes?");

        if (edad >= 18) {
            document.write("<p style = 'color:green;'>Eres mayor de edad.</p>");
        } else {
            document.write("<p style = 'color:red;'>Eres menor de edad.</p>");
        }
    </script>
    
</body>
</html>
