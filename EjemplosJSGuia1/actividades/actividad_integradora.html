<body>
    <h1 align="center" style="color: red;">Actividad Integradora</h1>
    <hr><br>

    //Desarrollar la actividad integradora final propuesta en la guía, aplicando:
        •	Variables.
        •	Operadores.
        •	Estructuras selectivas.
        •	Ciclos.
        •	Funciones.
        •	Eventos.

    <script>
        // Variables
        let nombre = prompt("¿Cuál es tu nombre?");
        let edad = parseInt(prompt("¿Cuántos años tienes?"));

        // Función para calcular el año de nacimiento
        function calcularAnioNacimiento(edad) {
            const anioActual = new Date().getFullYear();
            return anioActual - edad;
        }

        // Estructura selectiva
        if (edad >= 18) {
            alert(`¡Hola ${nombre}! Eres mayor de edad.`);
        } else {
            alert(`¡Hola ${nombre}! Eres menor de edad.`);
        }

        // Ciclo para mostrar los primeros 5 años de vida
        console.log(`Los primeros 5 años de vida de ${nombre} fueron:`);
        for (let i = 0; i < 5; i++) {
            console.log(`Año ${i + 1}: ${calcularAnioNacimiento(edad) + i}`);
        }
    </script>
