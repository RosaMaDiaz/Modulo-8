<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 — Variables y Operadores</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        h1 {
            color: red;
        }
        h2 {
            color: #2c3e50;
        }
        u {
            color: #e74c3c;
            font-weight: bold;
        }
        .contenedor {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
         .saludo {
            background-color: #e8f4f8;
            padding: 10px;
            border-left: 5px solid #3498db;
            margin-bottom: 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <h1 align="center" style="color: red;">Ejercicio 1: Variables y Operadores</h1>
    <hr><br>

    <div class="contenedor">
        <script>
            //Solicitar 2 numeros al usuario
            let numero1 = parseFloat(prompt("Ingrese el primer numero: "));
            let numero2 = parseFloat(prompt("Ingrese el segundo numero: "));
        
            //Realizar operaciones matematicas
            let suma = numero1 + numero2;
            let resta = numero1 - numero2;
            let multiplicacion = numero1 * numero2;
            let division = numero1 / numero2;
        
            //Mostrar los resultados
            document.write("<h2>Resultados de las Operaciones</h2>");
            document.write("<p>Suma: <u>" + suma + "</u></p>");
            document.write("<p>Resta: <u>" + resta + "</u></p>");
            document.write("<p>Multiplicación: <u>" + multiplicacion + "</u></p>");
            document.write("<p>División: <u>" + division + "</u></p>");

    
        </script>
    </div>

    <footer>
        <p style="text-align: center; margin-top: 20px; color: #777;">© 2026 - Ejercicio 1: Variables y Operadores - Rosa Díaz</p>  
    </footer>
    
</body>
</html>
