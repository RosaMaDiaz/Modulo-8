<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 — Bucles</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }
        h1 {
            color: red;
        }
        h2 {
            color: #2c3e50;
        }
        u {
            color: #e74c3c;
            font-weight: bold;
        }
        .contenedor {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
            border-left: 5px solid #3498db;
            
        }
        
    </style>
</head>
<body>
    <h1 align="center" style="color: red;">Ejercicio 3: Bucles</h1>
    <hr><br>

    <div class="contenedor">
        <script>
            // •	Muestre números del 1 al 10 usando for.
            document.write("<h2>Números del 1 al 10 usando for:</h2>");
            for (let i = 1; i <= 10; i++) {
                document.write(i + " ");
            }

            //•	Muestre números pares del 2 al 20 usando while.
            document.write("<h2>Números pares del 2 al 20 usando while:</h2>");
            let num = 2;
            while (num <= 20) {
                document.write(num + " ");
                num += 2;
            }

        </script>
    </div>

    <footer>
        <hr>
        <p style="text-align: center; margin-top: 20px; color: #777;">© 2026 - Actividad Parte 3: Uso de Bucles - Rosa Díaz</p>
    </footer>
    
</body>
</html>
