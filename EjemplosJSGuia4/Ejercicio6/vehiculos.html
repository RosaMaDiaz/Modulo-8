<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
    <title>Sistema de Registro de Vehículos</title>
    <link rel="stylesheet" href="css/vehiculos.css">

    <script src="js/vehiculos.js" defer></script>
</head>

<body>

    <header>
        <h1>Sistema de Registro de Vehículos</h1>
        <p>Uso de Formularios, Objetos y Tablas Dinámicas</p>
    </header>

    <main>

        <section class="contenedor-formulario">
            <h2>Registro de Vehículos</h2>

            <form id="frmVehiculo">

                <div class="grupo">
                    <label for="selfab">Fabricante</label>

                    <select id="selfab">
                        <option value="">Seleccione...</option>
                        <option value="Toyota">Toyota</option>
                        <option value="Nissan">Nissan</option>
                        <option value="Hyundai">Hyundai</option>
                        <option value="Honda">Honda</option>
                        <option value="Chevrolet">Chevrolet</option>
                    </select>
                </div>

                <div class="grupo">
                    <label for="selmod">Modelo</label>

                    <select id="selmod">
                        <option value="">Seleccione un fabricante</option>
                    </select>
                </div>

                <div class="grupo">
                    <label>Color</label>
    
                    <div class="radios">

                        <label>
                            <input type="radio" name="color" value="Blanco">
                                Blanco
                        </label>

                        <label>
                            <input type="radio" name="color" value="Negro">
                            Negro
                        </label>
                        <label>
                            <input type="radio" name="color" value="Gris">
                            Gris
                        </label>    


                        <label>
                            <input type="radio" name="color" value="Azul">
                            Azul
                        </label>
                        <label>
                            <input type="radio" name="color" value="Rojo">
                            Rojo
                        </label>


                    </div>
                </div>

                <div class="grupo">
                    <label for="txtanio">Año</label>
                    <input type="number"
                        id="txtanio"
                        min="2015"
                        max="2026"
                        value="2025">
                </div>

                <div class="botones">
                    <button type="button" id="btnRegistrar">
                        Registrar Vehículo
                    </button>

                    <button type="reset">
                        Limpiar
                    </button>
                </div>
            </form>

            <p id="mensaje"></p>
        </section>

        <section class="contenedor-tabla">
            <h2>Vehículos Registrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>Fabricante</th>
                        <th>Modelo</th>
                        <th>Color</th>
                        <th>Año</th>
                    </tr>
                </thead>

                <tbody id="tablaVehiculos">
                </tbody>

            </table>

        </section>

    </main>
</body>
</html>
