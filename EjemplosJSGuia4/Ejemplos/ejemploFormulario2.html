<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 2</title>
</head>
<body>
    <h1>Obtención de Valores con la Propiedad value</h1>
    <form id="miFormulario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"><br><br>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email"><br><br>

        <!--Obtención de Valores con checked-->
        <label for="suscripcion">Suscribirse al boletín:</label>
        <input type="checkbox" id="suscripcion" name="suscripcion"><br><br>

        <!--Obtención de Valores con selectedIndex y value-->
        <label for="pais">País:</label>
        <select id="pais" name="pais">
            <option value="rd">República Dominicana</option>
            <option value="mx">México</option>
            <option value="es">España</option>
        </select><br><br>

        <input type="submit" value="Enviar">
    </form>
    <!--Validación de Campos Vacíos-->
    <script>
        document.getElementById('miFormulario').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita que el formulario se envíe

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const suscripcion = document.getElementById('suscripcion').checked;
            const paisSelect = document.getElementById('pais');
            const pais = paisSelect.options[paisSelect.selectedIndex].value;

            if (nombre === '' || email === '') {
                alert('Por favor, complete todos los campos.');
                return;
            }

            console.log('Nombre:', nombre);
            console.log('Correo Electrónico:', email);
            console.log('Suscripción al boletín:', suscripcion);
            console.log('País seleccionado:', pais);

            alert(`Nombre: ${nombre}\nCorreo Electrónico: ${email}\nSuscripción al boletín: ${suscripcion}\nPaís seleccionado: ${pais}`);
        });

        //validacion de longitud minima
        document.getElementById('nombre').addEventListener('input', function() {
            const nombre = this.value;
            if (nombre.length < 3) {
                this.setCustomValidity('El nombre debe tener al menos 3 caracteres.');
            } else {
                this.setCustomValidity('');
            }
        });

        //validacion numerica
        document.getElementById('email').addEventListener('input', function() {
            const email = this.value;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                this.setCustomValidity('Por favor, ingrese un correo electrónico válido.');
            } else {
                this.setCustomValidity('');
            }
        });

       

    </script>
    
</body>
</html>
