<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Edad</title>
    <link rel="stylesheet" href="/css/formstyle.css">
</head>

<body>
    
    <div class="contenedor">
        <h1>Cálculo de Edad</h1>

        <div class="tarjeta">
            <label>Día de nacimiento</label>

            <select id="dia"></select>
                <label>Mes de nacimiento</label>

                <select id="mes"></select>
                <label>Año de nacimiento</label>

                <input type="number" id="anio" placeholder="Ej: 2005">

                <button id="btnCalcular">

                    Calcular Edad

                </button>

                <h2 id="resultado"></h2>

            </div>

        </div>

        <script src="/js/calculoedad.js"></script>
        
</body>
</html>
