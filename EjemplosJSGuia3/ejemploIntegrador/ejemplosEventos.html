<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Participates</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 20px;
        }

        .contenedor {
            max-width: 800px;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        #tarjetas {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tarjeta {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            width: 200px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }


    </style>
</head>

<body>
    <div class="contenedor">
        <h2>Registro de Participantes</h2>
        <input type="text" id="nombre" placeholder="Digite un nombre">
        <button onclick="agregarParticipante()">
            Agregar
        </button>   

        <div id="tarjetas"></div>
    </div>

    <script>
        let participantes = [];
        function agregarParticipante() {
            let nombre =
                document.getElementById("nombre").value;

                if (nombre === "") {
                    return;

                }
                participantes.push({
                    nombre: nombre

                });

            let tarjeta =
                document.createElement("div");
            tarjeta.classList.add("tarjeta");
            tarjeta.innerHTML =
                "<h3>" + nombre + "</h3>" +
                "<p>Participante registrado</p>";

            document.getElementById("tarjetas")
                .appendChild(tarjeta);

            document.getElementById("nombre").value = "";
        }

    </script>
</body>
</html>
