<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones Básicas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
        }
        button {
            padding: 10px;
            margin: 10px;
            border: none;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Funciones en JavaScript</h1>

    <button onclick="mostrarBienvenida()">Bienvenida</button>
    <button onclick="mostrarNombre()">Nombre</button>
    <button onclick="mostrarCurso()">Curso</button>
    <button onclick="mostrarMensaje()">Mensaje</button>

    <div id="resultado"></div>

    <--! SCRIPT INTERNO -->
    <script>
        // Función para mostrar bienvenida
        function mostrarBienvenida() {
            document.getElementById("resultado").innerHTML =
                "👋 ¡Bienvenido al aprendizaje de JavaScript!";
        }

        // Función para mostrar nombre
        function mostrarNombre() {
            document.getElementById("resultado").innerHTML =
                "👤 Nombre: Juan Pérez";
        }

        // Función para mostrar curso
        function mostrarCurso() {
            document.getElementById("resultado").innerHTML =
                "📚 Curso: Programación Web";
        }

        // Función para mensaje motivador
        function mostrarMensaje() {
            document.getElementById("resultado").innerHTML =
                "🚀 ¡Sigue aprendiendo, vas por buen camino!";
        }
</script>

</body>
</html>
