<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones con Parámetros</title>
    
<script>
    // Definición de la función
    function sumar(a, b) {
        let resultado = a + b;
        return resultado; // devuelve el valor calculado
    }
</script>

</head>
<body>
    <script>
        // Invocación de la función
        let x = 5;
        let y = 3;
        let total = sumar(x, y);
        document.write("La suma de " + x + " y " + y + " es: " + total);
        
</script>
</body>
</html>
