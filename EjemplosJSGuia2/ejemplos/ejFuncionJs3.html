<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones con Parametros sin Retorno</title>
    <script>
        function mostrarMensaje(nombre, sufijo) {
        document.write("Hola " + nombre + ", ¡bienvenid" + sufijo + "!<br>");
    }
</script>

</head>
<body>
    <script>
        mostrarMensaje("Ana", "a");
        mostrarMensaje("Carlos", "o");
    </script>
</body>
</html>
