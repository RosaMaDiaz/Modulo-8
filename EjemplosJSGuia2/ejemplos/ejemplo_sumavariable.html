<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suma Variable</title>
</head>
<body>
    <script>
        function sumar() {
            let total=0;
            for (let i = 0; i < arguments.length; i++) {
                total += arguments[i];
            }
            return total;
        }

        document.write(sumar(5, 10));
        document.write("<br>");
        document.write(sumar(5, 10, 15, 20));
    </script>
    
</body>
</html>
