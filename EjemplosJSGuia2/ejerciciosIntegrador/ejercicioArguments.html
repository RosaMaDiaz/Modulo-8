<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Objeto Arguments</title>
    <style>
        body{font-family:Arial;text-align:center;background:#34495e;color:#fff}
        button{padding:10px;margin:20px;border:none;border-radius:5px;background:#2ecc71;color:#fff}
        #resultado{margin-top:20px;font-weight:bold}

        ul { /* Estilos para la lista de datos, centralizando las viñetas al texto*/
            display: inline-block; 
            text-align: left;     
            padding-left: 20px;    
        }
    </style>
</head>
<body>
    <h2>📦 Uso del Objeto arguments</h2>
    
    <!-- Actividades de Extensión - Agregando mas datos, telefono y correo -->
    <button onclick="mostrarDatos('Juan', 25, 'Santo Domingo', 'Estudiante', '809-555-2321', 'juan@example.com')">
        Mostrar Datos
    </button>

    <div id="resultado"></div>

    <script>
        function mostrarDatos() {
            // 1. Inicializamos la salida abriendo la lista desordenada
            let salida = "<ul>";
    
            // 2. Recorremos los argumentos agregando cada elemento como un <li>
            for (let i = 0; i < arguments.length; i++) {
                salida += "<li>Dato " + (i + 1) + ": " + arguments[i] + "</li>";
            }
    
            // 3. Cerramos la lista desordenada al terminar el bucle
            salida += "</ul>";

            // 4. Mostramos la cantidad total de datos
            salida += "<br>Total de datos: " + arguments.length;

            // 5. PUNTO 2: Condicional para verificar si son más de 3 datos
            
            if (arguments.length > 3) {
                salida += "<br><br><strong>¡Se recibieron muchos datos!</strong>";
            }

            // 6. Finalmente, pintamos todo en el HTML
            document.getElementById("resultado").innerHTML = salida;
        }
    </script>
</body>
</html>
